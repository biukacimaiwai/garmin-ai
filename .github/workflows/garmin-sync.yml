name: Garmin Sync

on:
  schedule:
    - cron: "0 21 * * *"  # 9am Fiji time (UTC+12)
  workflow_dispatch:        # allows manual Run workflow button

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run sync (files mode)
        env:
          GARMIN_TOKEN_B64: ${{ secrets.GARMIN_TOKEN_B64 }}
        run: python sync_garmin.py --days 3 --sink files --out ./garmin

      # Optional: commit the updated garmin/ folder back to the repo
      - name: Commit garmin data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add garmin/
          git diff --cached --quiet || git commit -m "chore: garmin sync $(date -u +%Y-%m-%d)"
          git push
